<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>
    Symbiote Studio
  </title>

  <!-- ===================================================== -->
  <!-- Fonts -->
  <!-- ===================================================== -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- ===================================================== -->
  <!-- Symbiote Theme -->
  <!-- ===================================================== -->

  <style>

    /* =====================================================
     * Root
     * =================================================== */

    :root {

      --bg:
        #030303;

      --text:
        rgba(255,255,255,0.92);

      --muted:
        rgba(255,255,255,0.5);

      --label:
        rgba(255,255,255,0.72);

      --glass:
        rgba(255,255,255,0.05);

      --glass-border:
        rgba(255,255,255,0.08);

      --danger:
        rgba(255,90,90,0.92);

      --violet:
        #a78bfa;

      --shadow:
        0 24px 60px rgba(0,0,0,0.45);

      --radius:
        28px;
    }

    /* =====================================================
     * Global
     * =================================================== */

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {

      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);

      font-family:
        "Inter",
        sans-serif;

      -webkit-font-smoothing:
        antialiased;

      text-rendering:
        optimizeLegibility;
    }

    body {

      position: relative;
      min-height: 100dvh;

      padding:
        env(safe-area-inset-top)
        18px
        calc(140px + env(safe-area-inset-bottom))
        18px;

      overflow-y: auto;
    }

    /* =====================================================
     * Ambient Orbs
     * =================================================== */

    .orb {

      position: fixed;
      border-radius: 999px;
      filter: blur(120px);

      opacity: 0.22;

      pointer-events: none;

      animation:
        breathe 12s ease-in-out infinite;
    }

    .orb-blue {

      width: 340px;
      height: 340px;

      background:
        #245cff;

      top: -120px;
      left: -120px;
    }

    .orb-purple {

      width: 380px;
      height: 380px;

      background:
        #7c3aed;

      bottom: -160px;
      right: -120px;

      animation-delay: 3s;
    }

    @keyframes breathe {

      0% {
        transform:
          scale(1)
          translate3d(0,0,0);
      }

      50% {
        transform:
          scale(1.08)
          translate3d(10px,-10px,0);
      }

      100% {
        transform:
          scale(1)
          translate3d(0,0,0);
      }
    }

    /* =====================================================
     * Layout
     * =================================================== */

    .app {

      position: relative;
      z-index: 2;

      width: 100%;
      max-width: 760px;

      margin: 0 auto;
    }

    /* =====================================================
     * Header
     * =================================================== */

    .hero {

      margin-top: 18px;
      margin-bottom: 22px;
    }

    .title {

      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.04em;

      color:
        rgba(255,255,255,0.95);
    }

    .subtitle {

      margin-top: 8px;

      font-size: 0.95rem;
      color: var(--muted);

      letter-spacing: 0.02em;
    }

    /* =====================================================
     * Glass
     * =================================================== */

    .glass {

      background:
        var(--glass);

      border:
        1px solid
        var(--glass-border);

      backdrop-filter:
        blur(24px);

      -webkit-backdrop-filter:
        blur(24px);

      box-shadow:
        var(--shadow);

      border-radius:
        var(--radius);
    }

    /* =====================================================
     * Router Console
     * =================================================== */

    #routerConsole {

      padding: 22px;
      margin-bottom: 24px;
    }

    .console-header {

      margin-bottom: 22px;
    }

    .console-title {

      font-size: 1rem;
      font-weight: 500;

      color:
        rgba(255,255,255,0.92);
    }

    .console-subtitle {

      margin-top: 6px;

      font-size: 0.84rem;
      color: var(--muted);
    }

    .control {

      margin-bottom: 22px;
    }

    .control:last-child {

      margin-bottom: 0;
    }

    .control-top {

      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 12px;
    }

    .label {

      font-size: 0.9rem;
      color: var(--label);
    }

    .value {

      font-size: 0.88rem;
      color:
        rgba(255,255,255,0.9);
    }

    /* =====================================================
     * Select
     * =================================================== */

    select {

      width: 100%;

      border: none;
      outline: none;

      border-radius: 18px;

      padding:
        16px 18px;

      background:
        rgba(255,255,255,0.06);

      color:
        rgba(255,255,255,0.92);

      font-size: 0.95rem;

      appearance: none;
    }

    option {

      background:
        #111;

      color:
        white;
    }

    /* =====================================================
     * Slider
     * =================================================== */

    input[type="range"] {

      appearance: none;

      width: 100%;
      height: 6px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.12);

      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {

      appearance: none;

      width: 24px;
      height: 24px;

      border-radius: 50%;

      background:
        rgba(255,255,255,0.96);

      border:
        2px solid
        rgba(255,255,255,0.16);

      box-shadow:
        0 4px 20px rgba(255,255,255,0.25);

      cursor: pointer;
    }

    /* =====================================================
     * Experts Rack
     * =================================================== */

    #expertRack {

      display: flex;
      flex-direction: column;
      gap: 18px;

      width: 100%;
    }

    /* =====================================================
     * Expert Card Skeleton
     * =================================================== */

    .expert-card {

      position: relative;

      padding: 22px;

      border-radius:
        28px;

      background:
        rgba(255,255,255,0.045);

      border:
        1px solid
        rgba(255,255,255,0.08);

      backdrop-filter:
        blur(24px);

      -webkit-backdrop-filter:
        blur(24px);

      box-shadow:
        0 24px 60px rgba(0,0,0,0.45);
    }

    .expert-header {

      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      gap: 16px;

      margin-bottom: 20px;
    }

    .expert-title {

      font-size: 1rem;
      font-weight: 500;

      color:
        rgba(255,255,255,0.95);
    }

    .expert-subtitle {

      margin-top: 6px;

      font-size: 0.82rem;
      color: var(--muted);
    }

    .expert-badge {

      padding:
        8px 12px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.08);

      border:
        1px solid
        rgba(255,255,255,0.06);

      font-size: 0.72rem;

      color:
        rgba(255,255,255,0.82);
    }

    .expert-controls {

      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* =====================================================
     * Remove Button
     * =================================================== */

    .remove-btn {

      width: 100%;

      margin-top: 22px;

      border: none;
      outline: none;

      border-radius: 18px;

      padding:
        16px 18px;

      background:
        rgba(255,70,70,0.12);

      border:
        1px solid
        rgba(255,70,70,0.22);

      color:
        var(--danger);

      font-size: 0.92rem;
      font-weight: 500;

      transition:
        background 0.2s ease,
        transform 0.2s ease;
    }

    .remove-btn:active {

      transform:
        scale(0.985);
    }

    /* =====================================================
     * Bottom Dock
     * =================================================== */

    .dock {

      position: fixed;

      left: 0;
      right: 0;
      bottom: 0;

      z-index: 100;

      padding:
        18px
        18px
        calc(
          18px +
          env(safe-area-inset-bottom)
        );
    }

    .dock-inner {

      max-width: 760px;
      margin: 0 auto;
    }

    #addLayerBtn {

      width: 100%;

      border: none;
      outline: none;

      border-radius:
        24px;

      padding:
        20px;

      background:
        rgba(255,255,255,0.08);

      border:
        1px solid
        rgba(255,255,255,0.12);

      backdrop-filter:
        blur(24px);

      -webkit-backdrop-filter:
        blur(24px);

      color:
        rgba(255,255,255,0.96);

      font-size: 1rem;
      font-weight: 500;

      box-shadow:
        0 18px 60px rgba(0,0,0,0.4);

      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    #addLayerBtn:active {

      transform:
        scale(0.985);
    }

    /* =====================================================
     * Modal
     * =================================================== */

    #layerModal {

      position: fixed;
      inset: 0;

      z-index: 999;

      display: flex;
      align-items: flex-end;
      justify-content: center;

      background:
        rgba(0,0,0,0.42);

      opacity: 0;
      pointer-events: none;

      transition:
        opacity 0.28s ease;
    }

    #layerModal.open {

      opacity: 1;
      pointer-events: auto;
    }

    .sheet {

      width: 100%;
      max-width: 760px;

      padding:
        18px
        18px
        calc(
          18px +
          env(safe-area-inset-bottom)
        );

      border-radius:
        32px 32px 0 0;

      background:
        rgba(16,16,16,0.72);

      border:
        1px solid
        rgba(255,255,255,0.08);

      backdrop-filter:
        blur(28px);

      -webkit-backdrop-filter:
        blur(28px);

      transform:
        translateY(100%);

      transition:
        transform 0.32s cubic-bezier(
          0.22,
          1,
          0.36,
          1
        );
    }

    #layerModal.open .sheet {

      transform:
        translateY(0);
    }

    .sheet-handle {

      width: 56px;
      height: 6px;

      border-radius: 999px;

      margin:
        0 auto 22px;

      background:
        rgba(255,255,255,0.14);
    }

    .sheet-title {

      font-size: 1.05rem;
      font-weight: 500;

      margin-bottom: 18px;

      color:
        rgba(255,255,255,0.94);
    }

    .sheet-grid {

      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sheet-btn {

      width: 100%;

      border: none;
      outline: none;

      border-radius: 22px;

      padding:
        18px;

      background:
        rgba(255,255,255,0.06);

      border:
        1px solid
        rgba(255,255,255,0.08);

      color:
        rgba(255,255,255,0.94);

      font-size: 0.96rem;
      font-weight: 500;

      text-align: left;

      transition:
        background 0.2s ease,
        transform 0.2s ease;
    }

    .sheet-btn:active {

      transform:
        scale(0.985);
    }

    #injectCodeBtn {

      background:
        rgba(167,139,250,0.12);

      border:
        1px solid
        rgba(167,139,250,0.24);

      color:
        #d8ccff;
    }

    /* =====================================================
     * Scrollbar
     * =================================================== */

    ::-webkit-scrollbar {

      width: 0;
      height: 0;
    }

  </style>

  <!-- ===================================================== -->
  <!-- Eruda Mobile DevTools -->
  <!-- ===================================================== -->

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>
    eruda.init();
  </script>

</head>

<body>

  <!-- ===================================================== -->
  <!-- Ambient Background -->
  <!-- ===================================================== -->

  <div class="orb orb-blue"></div>
  <div class="orb orb-purple"></div>

  <!-- ===================================================== -->
  <!-- App -->
  <!-- ===================================================== -->

  <main class="app">

    <!-- =================================================== -->
    <!-- Header -->
    <!-- =================================================== -->

    <header class="hero">

      <h1 class="title">
        Symbiote Studio
      </h1>

      <p class="subtitle">
        MoE World Model Console
      </p>

    </header>

    <!-- =================================================== -->
    <!-- Router Console -->
    <!-- =================================================== -->

    <section
      id="routerConsole"
      class="glass"
    >

      <div class="console-header">

        <div class="console-title">
          Global Router Console
        </div>

        <div class="console-subtitle">
          Shared environmental state broadcasted to all active acoustic experts.
        </div>

      </div>

      <!-- Enclosure -->

      <div class="control">

        <div class="control-top">

          <div class="label">
            Enclosure
          </div>

        </div>

        <select id="enclosureSelect">

          <option value="Open">
            Open
          </option>

          <option value="Umbrella">
            Umbrella
          </option>

          <option value="Indoor">
            Indoor
          </option>

        </select>

      </div>

      <!-- Pressure -->

      <div class="control">

        <div class="control-top">

          <div class="label">
            Atmospheric Pressure / Weather Severity
          </div>

          <div
            class="value"
            id="pressureValue"
          >
            0.50
          </div>

        </div>

        <input
          type="range"
          id="pressureSlider"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
        />

      </div>

    </section>

    <!-- =================================================== -->
    <!-- Expert Rack -->
    <!-- =================================================== -->

    <section id="expertRack"></section>

  </main>

  <!-- ===================================================== -->
  <!-- Bottom Dock -->
  <!-- ===================================================== -->

  <div class="dock">

    <div class="dock-inner">

      <button id="addLayerBtn">
        Add Acoustic Expert
      </button>

    </div>

  </div>

  <!-- ===================================================== -->
  <!-- Bottom Sheet Modal -->
  <!-- ===================================================== -->

  <div id="layerModal">

    <div class="sheet">

      <div class="sheet-handle"></div>

      <div class="sheet-title">
        Inject Acoustic Expert
      </div>

      <div class="sheet-grid">

        <button
          class="sheet-btn"
          data-expert="rain"
        >
          Atmosphere · Rain
        </button>

        <button
          class="sheet-btn"
          data-expert="birds"
        >
          Ecology · Birds
        </button>

        <button
          class="sheet-btn"
          data-expert="typing"
        >
          Foley · Typing
        </button>

        <button
          class="sheet-btn"
          id="injectCodeBtn"
        >
          Custom · Paste Expert Code
        </button>

      </div>

    </div>

  </div>

  <!-- ===================================================== -->
  <!-- Engine Bootstrap -->
  <!-- ===================================================== -->

  <script type="module" src="./app.js"></script>

</body>
</html>
