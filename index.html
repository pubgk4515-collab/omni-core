<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Symbiote Atmosphere Factory</title>

  <style>
    :root {
      --bg: #030303;
      --panel: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.45);
      --accent: rgba(255,255,255,0.18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .background-glow {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(90px);
      opacity: 0.18;
    }

    .orb-1 {
      width: 220px;
      height: 220px;
      background: #3b82f6;
      top: -40px;
      left: -40px;
    }

    .orb-2 {
      width: 280px;
      height: 280px;
      background: #8b5cf6;
      bottom: -80px;
      right: -40px;
    }

    .shell {
      width: calc(100vw - 28px);
      max-width: 460px;
      height: calc(100dvh - 28px);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      z-index: 2;
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 10px 40px rgba(0,0,0,0.35);
    }

    .hero {
      padding: 24px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .title {
      font-size: 34px;
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
      font-weight: 400;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .status-card {
      padding: 18px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .status-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-value {
      font-size: 26px;
      line-height: 1;
      font-weight: 300;
      letter-spacing: -0.03em;
    }

    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .slider-label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .slider-value {
      font-size: 13px;
      color: var(--text);
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: white;
      border: none;
      cursor: pointer;
    }

    .generate-button {
      border: none;
      width: 100%;
      min-height: 74px;
      border-radius: 999px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.16),
          rgba(255,255,255,0.08)
        );

      color: white;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.02em;
      cursor: pointer;

      backdrop-filter: blur(20px);

      transition:
        transform 0.2s ease,
        background 0.2s ease,
        opacity 0.2s ease;
    }

    .generate-button:active {
      transform: scale(0.98);
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <div class="background-glow">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="shell">

    <section class="hero glass">
      <div class="eyebrow">Procedural Ecology Engine</div>

      <h1 class="title">
        Symbiote
      </h1>

      <div class="subtitle">
        Infinite generative environments driven by probabilistic ecology,
        modular DSP routing, and adaptive procedural atmospheres.
      </div>
    </section>

    <section class="status-grid">

      <div class="status-card glass">
        <div class="status-label">
          Current Scale
        </div>

        <div
          class="status-value"
          id="scaleText"
        >
          Dormant
        </div>
      </div>

      <div class="status-card glass">
        <div class="status-label">
          Ecology State
        </div>

        <div
          class="status-value"
          id="ecologyText"
        >
          Inactive
        </div>
      </div>

    </section>

    <section class="controls glass">

      <div class="slider-group">

        <div class="slider-row">
          <div class="slider-label">
            Master Volume
          </div>

          <div
            class="slider-value"
            id="masterValue"
          >
            80%
          </div>
        </div>

        <input
          id="masterSlider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0.8"
        />

      </div>

      <div class="slider-group">

        <div class="slider-row">
          <div class="slider-label">
            Reverb Wetness
          </div>

          <div
            class="slider-value"
            id="reverbValue"
          >
            40%
          </div>
        </div>

        <input
          id="reverbSlider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0.4"
        />

      </div>

    </section>

    <button
      class="generate-button glass"
      id="generateBtn"
    >
      Generate Environment
    </button>

    <div class="footer-note">
      Modular Procedural Atmosphere Composition Engine
    </div>

  </main>

  <script type="module" src="./factory_ui.js"></script>

</body>
</html>
