<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OmniEngine Factory</title>
  <style>
    :root {
      --bg-color: #030303;
      --glass-bg: rgba(20, 20, 22, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #e0e0e0;
      --text-muted: #7a7a7a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    body {
      background-color: var(--bg-color);
      color: var(--accent);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* Symbiote Organic Visuals at the top */
    .visual-space {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .greeting {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--text-muted);
      position: absolute;
      top: 40px;
    }

    .status-ring {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 200;
      letter-spacing: 4px;
      transition: all 0.8s ease;
    }

    /* One UI 8.5 Ergonomics - Everything in the bottom 35% */
    .control-deck {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      padding: 24px 20px 40px 20px;
      border-radius: 30px 30px 0 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: -8px;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    /* The Factory Button */
    .btn-generate {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 10px;
      transition: transform 0.1s ease;
    }
    
    .btn-generate:active { transform: scale(0.97); }

    #vibeLabel {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      min-height: 15px;
    }
  </style>
</head>
<body>

  <div class="visual-space">
    <div class="greeting">Hi Ameer</div>
    <div class="status-ring" id="playBtn">BOOT</div>
  </div>

  <div class="control-deck">
    <div id="vibeLabel">AWAITING GENERATION...</div>
    
    <div class="slider-group">
      <div class="slider-header"><span>Drone Core</span><span id="val-drone">0%</span></div>
      <input type="range" id="droneSlider" min="0" max="1" step="0.01" value="0">
    </div>

    <div class="slider-group">
      <div class="slider-header"><span>Wind Dynamics</span><span id="val-wind">0%</span></div>
      <input type="range" id="windSlider" min="0" max="1" step="0.01" value="0">
    </div>

    <button class="btn-generate" id="generateBtn">Generate Vibe</button>
  </div>

  <script src="omni_core.js" type="module"></script>
</body>
</html>
