<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Symbiote Studio</title>

  <style>

    :root {
      --bg: #030303;
      --panel: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);

      --text: rgba(255,255,255,0.94);
      --muted: rgba(255,255,255,0.48);

      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;

      background: var(--bg);
      color: var(--text);

      font-family:
        Inter,
        system-ui,
        sans-serif;
    }

    body {
      min-height: 100dvh;
      position: relative;
    }

    .background {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(100px);
      opacity: 0.16;
    }

    .orb-a {
      width: 320px;
      height: 320px;
      background: #2563eb;

      top: -120px;
      left: -80px;
    }

    .orb-b {
      width: 360px;
      height: 360px;
      background: #7c3aed;

      right: -140px;
      bottom: -160px;
    }

    .app {
      position: relative;
      z-index: 2;

      width: 100%;
      height: 100dvh;

      display: flex;
      flex-direction: column;

      padding:
        calc(env(safe-area-inset-top) + 14px)
        14px
        calc(env(safe-area-inset-bottom) + 14px);

      gap: 14px;
    }

    .glass {
      background: var(--panel);

      border: 1px solid var(--border);

      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);

      box-shadow:
        0 12px 40px rgba(0,0,0,0.35);

      border-radius: var(--radius);
    }

    .hero {
      padding: 22px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;

      color: var(--muted);

      margin-bottom: 10px;
    }

    .title {
      margin: 0;

      font-size: 38px;
      line-height: 1;

      font-weight: 300;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin-top: 14px;

      color: var(--muted);

      font-size: 14px;
      line-height: 1.6;
    }

    .layers {
      flex: 1;
      overflow-y: auto;

      display: flex;
      flex-direction: column;

      gap: 14px;

      padding-bottom: 120px;
    }

    .layer-card {
      padding: 18px;
    }

    .layer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 14px;
    }

    .layer-title {
      font-size: 18px;
      font-weight: 500;
    }

    .layer-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .slider-wrap {
      margin-top: 14px;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;

      height: 4px;

      border-radius: 999px;

      background: rgba(255,255,255,0.08);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;

      width: 20px;
      height: 20px;

      border-radius: 999px;
      background: white;

      border: none;
    }

    .dock {
      position: fixed;

      left: 14px;
      right: 14px;
      bottom:
        calc(env(safe-area-inset-bottom) + 14px);

      z-index: 10;

      display: flex;
      gap: 12px;
    }

    .dock-btn {
      flex: 1;

      min-height: 72px;

      border: none;
      border-radius: 999px;

      color: white;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.14),
          rgba(255,255,255,0.06)
        );

      font-size: 16px;
      font-weight: 500;

      backdrop-filter: blur(20px);
    }

    .modal {
      position: fixed;
      inset: 0;

      background:
        rgba(0,0,0,0.7);

      backdrop-filter: blur(18px);

      display: flex;
      align-items: flex-end;

      z-index: 20;

      opacity: 0;
      pointer-events: none;

      transition: opacity 0.25s ease;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      width: 100%;

      padding:
        18px
        18px
        calc(env(safe-area-inset-bottom) + 18px);

      border-top-left-radius: 32px;
      border-top-right-radius: 32px;

      background:
        rgba(20,20,20,0.94);

      border-top:
        1px solid rgba(255,255,255,0.08);

      display: flex;
      flex-direction: column;

      gap: 12px;
    }

    .sheet-title {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 8px;
    }

    .sheet-btn {
      min-height: 62px;

      border: none;
      border-radius: 20px;

      color: white;

      background:
        rgba(255,255,255,0.06);

      text-align: left;

      padding: 0 18px;

      font-size: 15px;
    }

  </style>
</head>

<body>

  <div class="background">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
  </div>

  <main class="app">

    <section class="hero glass">

      <div class="eyebrow">
        Procedural Acoustic World Simulator
      </div>

      <h1 class="title">
        Symbiote Studio
      </h1>

      <div class="subtitle">
        Layer-driven procedural ecology and spatial acoustic synthesis.
      </div>

    </section>

    <section
      class="layers"
      id="layerContainer"
    ></section>

  </main>

  <div class="dock">

    <button
      class="dock-btn glass"
      id="initBtn"
    >
      Initialize Audio
    </button>

    <button
      class="dock-btn glass"
      id="addLayerBtn"
    >
      Add Layer
    </button>

  </div>

  <div
    class="modal"
    id="layerModal"
  >

    <div class="sheet">

      <div class="sheet-title">
        Add Layer
      </div>

      <button
        class="sheet-btn"
        data-layer="rain"
      >
        Atmosphere · Rain
      </button>

      <button
        class="sheet-btn"
        data-layer="birds"
      >
        Ecology · Birds
      </button>

      <button
        class="sheet-btn"
        data-layer="typing"
      >
        Foley · Typing
      </button>

    </div>

  </div>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>
</html>
