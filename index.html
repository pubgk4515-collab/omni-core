<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Symbiote Engine</title>

  <style>

    :root {

      --bg: #030303;

      --panel:
        rgba(255,255,255,0.05);

      --border:
        rgba(255,255,255,0.08);

      --text:
        rgba(255,255,255,0.92);

      --muted:
        rgba(255,255,255,0.5);

      --accent:
        #a78bfa;

      --radius:
        28px;
    }

    * {

      box-sizing: border-box;

      -webkit-tap-highlight-color:
        transparent;
    }

    html,
    body {

      width: 100%;
      height: 100%;

      margin: 0;

      overflow: hidden;

      background:
        var(--bg);

      color:
        var(--text);

      font-family:
        Inter,
        SF Pro Display,
        system-ui,
        sans-serif;
    }

    body {

      position: relative;
    }

    /* ======================================================
     * Ambient Background
    ======================================================= */

    .background {

      position: absolute;
      inset: 0;

      overflow: hidden;

      pointer-events: none;
    }

    .orb {

      position: absolute;

      border-radius: 999px;

      filter: blur(140px);

      opacity: 0.18;

      animation:
        drift 14s ease-in-out infinite alternate;
    }

    .orb-a {

      width: 420px;
      height: 420px;

      background:
        radial-gradient(
          circle,
          rgba(59,130,246,0.85),
          transparent 70%
        );

      top: -160px;
      left: -120px;
    }

    .orb-b {

      width: 380px;
      height: 380px;

      background:
        radial-gradient(
          circle,
          rgba(124,58,237,0.85),
          transparent 70%
        );

      right: -140px;
      top: 20%;
    }

    .orb-c {

      width: 360px;
      height: 360px;

      background:
        radial-gradient(
          circle,
          rgba(168,85,247,0.55),
          transparent 70%
        );

      bottom: -140px;
      left: 15%;
    }

    @keyframes drift {

      from {

        transform:
          translate3d(0,0,0)
          scale(1);
      }

      to {

        transform:
          translate3d(30px,-20px,0)
          scale(1.08);
      }
    }

    /* ======================================================
     * Layout
    ======================================================= */

    .app {

      position: relative;
      z-index: 2;

      width: 100%;
      height: 100dvh;

      overflow: hidden;

      display: flex;
      flex-direction: column;

      padding:
        calc(env(safe-area-inset-top) + 16px)
        16px
        calc(env(safe-area-inset-bottom) + 16px);
    }

    .scroll {

      flex: 1;

      overflow-y: auto;

      display: flex;
      flex-direction: column;

      gap: 16px;

      padding-bottom: 120px;

      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar {

      display: none;
    }

    /* ======================================================
     * Glass
    ======================================================= */

    .glass {

      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.06),
          rgba(255,255,255,0.03)
        );

      border:
        1px solid var(--border);

      backdrop-filter:
        blur(24px);

      -webkit-backdrop-filter:
        blur(24px);

      box-shadow:
        0 20px 60px rgba(0,0,0,0.35);

      border-radius:
        var(--radius);
    }

    /* ======================================================
     * Hero
    ======================================================= */

    .hero {

      padding: 24px;
    }

    .eyebrow {

      font-size: 11px;

      letter-spacing: 0.24em;

      text-transform: uppercase;

      color:
        var(--muted);

      margin-bottom: 10px;
    }

    .title {

      margin: 0;

      font-size: 42px;

      line-height: 0.95;

      font-weight: 300;

      letter-spacing: -0.06em;
    }

    .subtitle {

      margin-top: 14px;

      font-size: 14px;

      color:
        var(--muted);
    }

    /* ======================================================
     * Panels
    ======================================================= */

    .panel {

      padding: 18px;
    }

    .panel-title {

      font-size: 18px;

      font-weight: 500;

      margin-bottom: 18px;
    }

    .control {

      display: flex;
      flex-direction: column;

      gap: 10px;

      margin-bottom: 18px;
    }

    .control:last-child {

      margin-bottom: 0;
    }

    .control-top {

      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label {

      font-size: 14px;
    }

    .value {

      font-size: 13px;

      color:
        var(--muted);
    }

    /* ======================================================
     * Inputs
    ======================================================= */

    select {

      width: 100%;

      border: none;
      outline: none;

      padding: 14px 16px;

      border-radius: 18px;

      background:
        rgba(255,255,255,0.06);

      color: white;

      font-size: 15px;

      appearance: none;
    }

    input[type="range"] {

      width: 100%;

      appearance: none;

      height: 6px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.08);

      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {

      appearance: none;

      width: 22px;
      height: 22px;

      border-radius: 999px;

      background:
        white;

      border:
        1px solid rgba(255,255,255,0.25);

      box-shadow:
        0 6px 20px rgba(255,255,255,0.15);
    }

    /* ======================================================
     * Layer Container
    ======================================================= */

    #layerContainer {

      display: flex;
      flex-direction: column;

      gap: 14px;
    }

    .expert-card {

      padding: 18px;
    }

    .expert-top {

      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      margin-bottom: 16px;
    }

    .expert-name {

      font-size: 18px;

      font-weight: 500;
    }

    .expert-type {

      margin-top: 6px;

      font-size: 13px;

      color:
        var(--muted);
    }

    .badge {

      padding:
        8px 12px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.06);

      font-size: 11px;

      letter-spacing: 0.12em;

      text-transform: uppercase;

      color:
        rgba(255,255,255,0.7);
    }

    /* ======================================================
     * Bottom Dock
    ======================================================= */

    .dock {

      position: fixed;

      left: 16px;
      right: 16px;

      bottom:
        calc(env(safe-area-inset-bottom) + 16px);

      z-index: 20;
    }

    .dock-inner {

      padding: 14px;
    }

    .primary-btn {

      width: 100%;
      min-height: 64px;

      border: none;
      outline: none;

      border-radius: 999px;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.14),
          rgba(255,255,255,0.08)
        );

      color: white;

      font-size: 16px;

      font-weight: 600;

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .primary-btn:active {

      transform: scale(0.985);
    }

    /* ======================================================
     * Modal
    ======================================================= */

    #layerModal {

      position: fixed;
      inset: 0;

      z-index: 40;

      opacity: 0;

      pointer-events: none;

      background:
        rgba(0,0,0,0.55);

      backdrop-filter:
        blur(10px);

      transition:
        opacity 0.35s ease;
    }

    #layerModal.open {

      opacity: 1;

      pointer-events: auto;
    }

    .sheet {

      position: absolute;

      left: 0;
      right: 0;
      bottom: 0;

      padding:
        18px
        18px
        calc(env(safe-area-inset-bottom) + 20px);

      border-top-left-radius: 32px;
      border-top-right-radius: 32px;

      background:
        rgba(16,16,16,0.95);

      border-top:
        1px solid rgba(255,255,255,0.08);

      transform:
        translateY(100%);

      transition:
        transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #layerModal.open .sheet {

      transform:
        translateY(0);
    }

    .sheet-handle {

      width: 52px;
      height: 5px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.16);

      margin:
        0 auto 18px;
    }

    .sheet-title {

      font-size: 28px;

      font-weight: 300;

      margin-bottom: 18px;
    }

    .sheet-grid {

      display: flex;
      flex-direction: column;

      gap: 12px;
    }

    .sheet-btn {

      width: 100%;

      min-height: 74px;

      border: none;
      outline: none;

      border-radius: 24px;

      background:
        rgba(255,255,255,0.05);

      border:
        1px solid rgba(255,255,255,0.06);

      color:
        rgba(255,255,255,0.92);

      font-size: 15px;

      text-align: left;

      padding: 0 18px;

      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .sheet-btn:active {

      transform:
        scale(0.985);

      background:
        rgba(255,255,255,0.08);
    }

  </style>
</head>

<body>

  <!-- Ambient -->

  <div class="background">

    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>

  </div>

  <!-- App -->

  <main class="app">

    <div class="scroll">

      <!-- Hero -->

      <section class="hero glass">

        <div class="eyebrow">
          Compact Mixture of Experts
        </div>

        <h1 class="title">
          Symbiote Engine
        </h1>

        <div class="subtitle">
          MoE Acoustic World Model
        </div>

      </section>

      <!-- Router Console -->

      <section class="panel glass">

        <div class="panel-title">
          Router Console
        </div>

        <div class="control">

          <div class="control-top">

            <div class="label">
              Enclosure
            </div>

          </div>

          <select id="enclosureSelect">

            <option>
              Open
            </option>

            <option>
              Umbrella
            </option>

            <option>
              Indoor
            </option>

          </select>

        </div>

        <div class="control">

          <div class="control-top">

            <div class="label">
              Atmospheric Pressure
            </div>

            <div
              class="value"
              id="pressureValue"
            >
              0.42
            </div>

          </div>

          <input
            type="range"
            id="pressureSlider"
            min="0"
            max="1"
            step="0.01"
            value="0.42"
          />

        </div>

      </section>

      <!-- Active Experts -->

      <section
        id="layerContainer"
      ></section>

    </div>

  </main>

  <!-- Bottom Dock -->

  <div class="dock">

    <div class="dock-inner glass">

      <button
        class="primary-btn"
        id="addExpertBtn"
      >
        Add Expert
      </button>

    </div>

  </div>

  <!-- Modal -->

  <div id="layerModal">

    <div class="sheet">

      <div class="sheet-handle"></div>

      <div class="sheet-title">
        Inject Expert Module
      </div>

      <div class="sheet-grid">

        <button
          class="sheet-btn"
          data-layer="rain"
        >
          Atmosphere · Rain
        </button>

        <button
          class="sheet-btn"
          data-layer="ecology"
        >
          Ecology · Birds
        </button>

        <button
          class="sheet-btn"
          data-layer="foley"
        >
          Foley · Typing
        </button>

        <button
          class="sheet-btn"
          id="injectCodeBtn"
          style="color: #a78bfa;"
        >
          Custom · Inject Code
        </button>

      </div>

    </div>

  </div>

  <script type="module" src="./app.js"></script>

</body>
</html>
