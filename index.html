<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Symbiote Studio</title>

  <style>

    :root {

      --bg: #030303;

      --panel:
        rgba(255,255,255,0.05);

      --panel-strong:
        rgba(255,255,255,0.08);

      --border:
        rgba(255,255,255,0.08);

      --text:
        rgba(255,255,255,0.92);

      --muted:
        rgba(255,255,255,0.5);

      --label:
        rgba(255,255,255,0.72);

      --danger:
        rgba(255,90,90,0.92);

      --danger-bg:
        rgba(255,90,90,0.10);

      --violet:
        #a78bfa;

      --radius-xl: 30px;

      --radius-lg: 24px;

      --dock-height: 104px;
    }

    * {

      box-sizing: border-box;

      -webkit-tap-highlight-color:
        transparent;
    }

    html,
    body {

      width: 100%;
      height: 100%;

      margin: 0;
      overflow: hidden;

      background: var(--bg);

      color: var(--text);

      font-family:
        Inter,
        "SF Pro Display",
        system-ui,
        sans-serif;
    }

    body {

      position: relative;
    }

    /* ========================================================
     * Ambient Orbs
     * ====================================================== */

    .orb {

      position: absolute;

      border-radius: 999px;

      filter: blur(140px);

      pointer-events: none;

      opacity: 0.22;

      animation:
        breathe 14s ease-in-out infinite alternate;
    }

    .orb-blue {

      width: 420px;
      height: 420px;

      top: -180px;
      left: -120px;

      background:
        radial-gradient(
          circle,
          rgba(37,99,235,0.85),
          transparent 70%
        );
    }

    .orb-purple {

      width: 460px;
      height: 460px;

      right: -180px;
      bottom: -220px;

      background:
        radial-gradient(
          circle,
          rgba(124,58,237,0.82),
          transparent 70%
        );
    }

    @keyframes breathe {

      0% {

        transform:
          scale(1)
          translate3d(0,0,0);
      }

      100% {

        transform:
          scale(1.08)
          translate3d(24px,-20px,0);
      }
    }

    /* ========================================================
     * App Layout
     * ====================================================== */

    .app {

      position: relative;
      z-index: 2;

      width: 100%;
      height: 100dvh;

      overflow: hidden;

      display: flex;
      flex-direction: column;

      padding:
        calc(env(safe-area-inset-top) + 16px)
        16px
        calc(env(safe-area-inset-bottom) + 16px);
    }

    .scroll {

      flex: 1;

      overflow-y: auto;

      padding-bottom:
        calc(var(--dock-height) + 48px);

      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar {

      display: none;
    }

    /* ========================================================
     * Glass
     * ====================================================== */

    .glass {

      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.06),
          rgba(255,255,255,0.035)
        );

      border:
        1px solid var(--border);

      backdrop-filter:
        blur(24px);

      -webkit-backdrop-filter:
        blur(24px);

      box-shadow:
        0 24px 80px rgba(0,0,0,0.4);
    }

    /* ========================================================
     * Header
     * ====================================================== */

    .hero {

      padding:
        22px
        22px
        20px;

      border-radius:
        var(--radius-xl);

      margin-bottom: 16px;
    }

    .hero-sub {

      font-size: 12px;

      letter-spacing: 0.24em;

      text-transform: uppercase;

      color: var(--muted);

      margin-bottom: 12px;
    }

    .hero-title {

      margin: 0;

      font-size: 42px;

      line-height: 0.92;

      letter-spacing: -0.06em;

      font-weight: 300;

      color:
        rgba(255,255,255,0.96);
    }

    .hero-caption {

      margin-top: 14px;

      font-size: 14px;

      color: var(--muted);

      line-height: 1.5;
    }

    /* ========================================================
     * Router Console
     * ====================================================== */

    #routerConsole {

      padding: 18px;

      border-radius:
        var(--radius-xl);

      margin-bottom: 18px;
    }

    .panel-header {

      display: flex;
      align-items: center;
      justify-content: space-between;

      margin-bottom: 20px;
    }

    .panel-title {

      font-size: 18px;

      letter-spacing: -0.02em;

      font-weight: 500;
    }

    .panel-meta {

      font-size: 12px;

      color: var(--muted);
    }

    .control {

      display: flex;
      flex-direction: column;

      gap: 12px;

      margin-bottom: 20px;
    }

    .control:last-child {

      margin-bottom: 0;
    }

    .control-top {

      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label {

      font-size: 14px;

      color: var(--label);
    }

    .value {

      font-size: 13px;

      color: var(--muted);
    }

    /* ========================================================
     * Select
     * ====================================================== */

    select {

      width: 100%;

      border: none;
      outline: none;

      border-radius: 18px;

      padding:
        15px
        16px;

      background:
        rgba(255,255,255,0.06);

      color:
        rgba(255,255,255,0.92);

      font-size: 15px;

      appearance: none;

      transition:
        background 0.25s ease;
    }

    select:focus {

      background:
        rgba(255,255,255,0.09);
    }

    /* ========================================================
     * Slider
     * ====================================================== */

    input[type="range"] {

      width: 100%;

      appearance: none;

      height: 6px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.08);

      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {

      appearance: none;

      width: 24px;
      height: 24px;

      border-radius: 999px;

      border:
        1px solid rgba(255,255,255,0.18);

      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,1),
          rgba(255,255,255,0.82)
        );

      box-shadow:
        0 8px 24px rgba(255,255,255,0.18);
    }

    input[type="range"]::-moz-range-thumb {

      width: 24px;
      height: 24px;

      border: none;

      border-radius: 999px;

      background: white;
    }

    /* ========================================================
     * Experts Rack
     * ====================================================== */

    #expertRack {

      display: flex;
      flex-direction: column;

      gap: 16px;
    }

    /* ========================================================
     * Expert Card Skeleton
     * ====================================================== */

    .expert-card {

      padding: 18px;

      border-radius:
        var(--radius-lg);
    }

    .expert-header {

      display: flex;
      align-items: flex-start;
      justify-content: space-between;

      margin-bottom: 18px;
    }

    .expert-title {

      font-size: 20px;

      letter-spacing: -0.03em;

      font-weight: 500;
    }

    .expert-subtitle {

      margin-top: 6px;

      font-size: 13px;

      color: var(--muted);
    }

    .expert-badge {

      padding:
        8px
        12px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.06);

      font-size: 11px;

      letter-spacing: 0.14em;

      text-transform: uppercase;

      color:
        rgba(255,255,255,0.7);
    }

    .expert-controls {

      display: flex;
      flex-direction: column;

      gap: 16px;
    }

    /* ========================================================
     * Remove Button
     * ====================================================== */

    .remove-btn {

      margin-top: 18px;

      width: 100%;
      min-height: 52px;

      border: none;
      outline: none;

      border-radius: 18px;

      background:
        rgba(255,90,90,0.08);

      border:
        1px solid rgba(255,90,90,0.18);

      color:
        rgba(255,120,120,0.92);

      font-size: 14px;

      font-weight: 600;

      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .remove-btn:active {

      transform: scale(0.985);

      background:
        rgba(255,90,90,0.14);
    }

    /* ========================================================
     * Bottom Dock
     * ====================================================== */

    .dock {

      position: fixed;

      left: 16px;
      right: 16px;

      bottom:
        calc(env(safe-area-inset-bottom) + 16px);

      z-index: 50;
    }

    .dock-inner {

      padding: 14px;

      border-radius:
        999px;
    }

    #addLayerBtn {

      width: 100%;
      min-height: 66px;

      border: none;
      outline: none;

      border-radius: 999px;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.14),
          rgba(255,255,255,0.08)
        );

      color: white;

      font-size: 16px;

      font-weight: 600;

      letter-spacing: -0.02em;

      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    #addLayerBtn:active {

      transform: scale(0.985);

      opacity: 0.92;
    }

    /* ========================================================
     * Bottom Sheet Modal
     * ====================================================== */

    #layerModal {

      position: fixed;
      inset: 0;

      z-index: 100;

      background:
        rgba(0,0,0,0.58);

      backdrop-filter:
        blur(10px);

      opacity: 0;
      pointer-events: none;

      transition:
        opacity 0.35s ease;
    }

    #layerModal.open {

      opacity: 1;
      pointer-events: auto;
    }

    .sheet {

      position: absolute;

      left: 0;
      right: 0;
      bottom: 0;

      padding:
        18px
        18px
        calc(env(safe-area-inset-bottom) + 20px);

      border-top-left-radius: 34px;
      border-top-right-radius: 34px;

      background:
        rgba(14,14,14,0.96);

      border-top:
        1px solid rgba(255,255,255,0.08);

      transform:
        translateY(100%);

      transition:
        transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }

    #layerModal.open .sheet {

      transform:
        translateY(0);
    }

    .sheet-handle {

      width: 54px;
      height: 5px;

      border-radius: 999px;

      background:
        rgba(255,255,255,0.18);

      margin:
        0 auto 18px;
    }

    .sheet-title {

      font-size: 30px;

      letter-spacing: -0.05em;

      font-weight: 300;

      margin-bottom: 18px;
    }

    .sheet-grid {

      display: flex;
      flex-direction: column;

      gap: 12px;
    }

    .sheet-btn {

      width: 100%;
      min-height: 76px;

      border: none;
      outline: none;

      border-radius: 24px;

      padding:
        0
        18px;

      text-align: left;

      background:
        rgba(255,255,255,0.05);

      border:
        1px solid rgba(255,255,255,0.06);

      color: white;

      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .sheet-btn:active {

      transform: scale(0.985);

      background:
        rgba(255,255,255,0.09);
    }

    .sheet-btn-title {

      font-size: 16px;

      font-weight: 500;
    }

    .sheet-btn-sub {

      margin-top: 4px;

      font-size: 13px;

      color: var(--muted);
    }

    #injectCodeBtn {

      border:
        1px solid rgba(167,139,250,0.28);

      background:
        rgba(167,139,250,0.12);
    }

    #injectCodeBtn .sheet-btn-title {

      color:
        rgba(215,200,255,0.96);
    }

    /* ========================================================
     * Responsive
     * ====================================================== */

    @media (min-width: 768px) {

      .app {

        max-width: 520px;

        margin: 0 auto;
      }
    }

  </style>

</head>

<body>

  <!-- ======================================================
       Ambient Background
  ======================================================= -->

  <div class="orb orb-blue"></div>

  <div class="orb orb-purple"></div>

  <!-- ======================================================
       App
  ======================================================= -->

  <main class="app">

    <div class="scroll">

      <!-- ==================================================
           Header
      =================================================== -->

      <section class="hero glass">

        <div class="hero-sub">
          Procedural Acoustic System
        </div>

        <h1 class="hero-title">
          Symbiote Studio
        </h1>

        <div class="hero-caption">
          MoE World Model Console
        </div>

      </section>

      <!-- ==================================================
           Router Console
      =================================================== -->

      <section
        id="routerConsole"
        class="glass"
      >

        <div class="panel-header">

          <div class="panel-title">
            Router Console
          </div>

          <div class="panel-meta">
            Global State
          </div>

        </div>

        <!-- Enclosure -->

        <div class="control">

          <div class="control-top">

            <div class="label">
              Enclosure
            </div>

          </div>

          <select id="enclosureSelect">

            <option value="Open">
              Open
            </option>

            <option value="Umbrella">
              Umbrella
            </option>

            <option value="Indoor">
              Indoor
            </option>

          </select>

        </div>

        <!-- Pressure -->

        <div class="control">

          <div class="control-top">

            <div class="label">
              Atmospheric Pressure
            </div>

            <div
              class="value"
              id="pressureValue"
            >
              0.42
            </div>

          </div>

          <input
            type="range"
            id="pressureSlider"
            min="0"
            max="1"
            step="0.01"
            value="0.42"
          />

        </div>

      </section>

      <!-- ==================================================
           Experts Rack
      =================================================== -->

      <section id="expertRack">

        <!-- ================================================
             Example Skeleton Card
             (Reference Structure)
        ================================================= -->

        <article
          class="expert-card glass"
        >

          <div class="expert-header">

            <div>

              <div class="expert-title">
                Rain Expert
              </div>

              <div class="expert-subtitle">
                Procedural Atmosphere Module
              </div>

            </div>

            <div class="expert-badge">
              Active
            </div>

          </div>

          <div class="expert-controls">

            <div class="control">

              <div class="control-top">

                <div class="label">
                  Droplet Density
                </div>

                <div class="value">
                  0.72
                </div>

              </div>

              <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                value="0.72"
              />

            </div>

          </div>

          <button
            class="remove-btn"
          >
            Remove Expert
          </button>

        </article>

      </section>

    </div>

  </main>

  <!-- ======================================================
       Bottom Dock
  ======================================================= -->

  <div class="dock">

    <div class="dock-inner glass">

      <button id="addLayerBtn">
        Add Acoustic Expert
      </button>

    </div>

  </div>

  <!-- ======================================================
       Bottom Sheet Modal
  ======================================================= -->

  <div id="layerModal">

    <div class="sheet">

      <div class="sheet-handle"></div>

      <div class="sheet-title">
        Inject Expert Module
      </div>

      <div class="sheet-grid">

        <!-- Rain -->

        <button
          class="sheet-btn"
          data-expert="rain"
        >

          <div class="sheet-btn-title">
            Atmosphere · Rain
          </div>

          <div class="sheet-btn-sub">
            Procedural droplet simulation
          </div>

        </button>

        <!-- Birds -->

        <button
          class="sheet-btn"
          data-expert="birds"
        >

          <div class="sheet-btn-title">
            Ecology · Birds
          </div>

          <div class="sheet-btn-sub">
            Stochastic wildlife layer
          </div>

        </button>

        <!-- Typing -->

        <button
          class="sheet-btn"
          data-expert="typing"
        >

          <div class="sheet-btn-title">
            Foley · Typing
          </div>

          <div class="sheet-btn-sub">
            Near-field keyboard textures
          </div>

        </button>

        <!-- Injection -->

        <button
          class="sheet-btn"
          id="injectCodeBtn"
        >

          <div class="sheet-btn-title">
            Custom · Paste Expert Code
          </div>

          <div class="sheet-btn-sub">
            Runtime ES6 Expert Injection
          </div>

        </button>

      </div>

    </div>

  </div>

  <!-- ======================================================
       UI Logic
  ======================================================= -->

  <script type="module">

    /* ======================================================
     * DOM
    ======================================================= */

    const addLayerBtn =
      document.getElementById(
        "addLayerBtn"
      );

    const layerModal =
      document.getElementById(
        "layerModal"
      );

    const pressureSlider =
      document.getElementById(
        "pressureSlider"
      );

    const pressureValue =
      document.getElementById(
        "pressureValue"
      );

    /* ======================================================
     * Modal Open
    ======================================================= */

    addLayerBtn.addEventListener(
      "click",
      () => {

        layerModal.classList.add(
          "open"
        );
      }
    );

    /* ======================================================
     * Overlay Close
    ======================================================= */

    layerModal.addEventListener(
      "click",
      (e) => {

        /**
         * Click outside sheet.
         */

        if (
          e.target === layerModal
        ) {

          layerModal.classList.remove(
            "open"
          );
        }

        /**
         * Any sheet button closes modal.
         */

        if (
          e.target.closest(
            ".sheet-btn"
          )
        ) {

          layerModal.classList.remove(
            "open"
          );
        }
      }
    );

    /* ======================================================
     * Slider UI Feedback
    ======================================================= */

    pressureSlider.addEventListener(
      "input",
      () => {

        pressureValue.textContent =
          Number(
            pressureSlider.value
          ).toFixed(2);
      }
    );

  </script>

</body>
</html>
